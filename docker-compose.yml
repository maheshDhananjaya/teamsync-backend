version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teamsync-postgres
    environment:
      POSTGRES_USER: teamsync_user
      POSTGRES_PASSWORD: teamsync_secure_password
      POSTGRES_DB: teamsync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: